name: Build STM32 Firmware

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build Firmware
        run: pio run

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .pio/build/nucleo_f446re/*
